name: Generate Bird Thumbnails

on:
  push:
    paths:
      - "images/birds/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show ImageMagick version
        run: |
          magick -version || convert -version

      - name: Show libvips version
        run: |
          vips --version || true

      - name: List bird images
        run: |
          find images/birds -maxdepth 2 -type f
