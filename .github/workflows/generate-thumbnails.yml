name: Generate Bird Thumbnails

on:
  workflow_dispatch:

jobs:
  thumbnails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Detect ImageMagick command
        id: im
        shell: bash
        run: |
          if command -v magick >/dev/null 2>&1; then
            echo "cmd=magick" >> $GITHUB_OUTPUT
          elif command -v convert >/dev/null 2>&1; then
            echo "cmd=convert" >> $GITHUB_OUTPUT
          else
            echo "ImageMagick not found"
            exit 1
          fi

      - name: Create cards folder
        run: mkdir -p images/birds/cards

      - name: Generate thumbnails
        shell: bash
        run: |
          CMD="${{ steps.im.outputs.cmd }}"

          count=0

          find images/birds -maxdepth 1 -type f -iname "*.avif" | while read img; do

            filename=$(basename "$img")
            thumb="images/birds/cards/$filename"

            # Skip if thumbnail exists and is newer
            if [ -f "$thumb" ] && [ "$thumb" -nt "$img" ]; then
              echo "Skipping $filename"
              continue
            fi

            echo "Generating $filename"

            "$CMD" "$img" \
              -resize 800x800\> \
              -gravity center \
              -background white \
              -strip \
              -quality 88 \
              "$thumb"

            count=$((count+1))
          done

          echo "Done."

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/birds/cards

          if git diff --cached --quiet; then
            echo "No thumbnail changes."
          else
            git commit -m "Update bird thumbnails"
            git push
          fi
