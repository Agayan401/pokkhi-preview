name: Generate Bird Thumbnails

on:
  workflow_dispatch:

jobs:

  thumbnails:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run thumbnails

      - name: Commit thumbnails
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add images/birds/cards

          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Update bird thumbnails"
            git push
          fi
