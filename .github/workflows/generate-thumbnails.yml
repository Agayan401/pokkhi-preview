name: Generate Bird Thumbnails

on:
  workflow_dispatch:

jobs:
  thumbnails:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Create cards folder
        run: mkdir -p images/birds/cards

      - name: Generate thumbnails
        run: |
          find images/birds -maxdepth 1 -name "*.avif" | while read img; do
            filename=$(basename "$img")
            magick "$img" \
              -resize 800x800\> \
              -strip \
              -quality 85 \
              -define heic:speed=6 \
              "images/birds/cards/$filename"
          done

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/birds/cards

          if git diff --cached --quiet; then
            echo "No thumbnails changed."
          else
            git commit -m "Update bird thumbnails"
            git push
          fi
