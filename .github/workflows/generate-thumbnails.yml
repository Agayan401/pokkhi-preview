name: Generate Bird Thumbnails

on:
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Check ImageMagick
        run: |
          magick -version || convert -version

      - name: Check AVIF support
        run: |
          magick -list format | grep AVIF || convert -list format | grep AVIF
