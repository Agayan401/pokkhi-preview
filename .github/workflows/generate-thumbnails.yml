name: Generate Bird Thumbnails

on:
  workflow_dispatch:

jobs:
  thumbnails:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-tools

      - name: Create cards folder
        run: mkdir -p images/birds/cards

      - name: Generate thumbnails
        shell: bash
        run: |
          find images/birds -maxdepth 1 -type f -iname "*.avif" | while read img; do

            filename=$(basename "$img")
            thumb="images/birds/cards/$filename"

            if [ -f "$thumb" ] && [ "$thumb" -nt "$img" ]; then
              echo "Skipping $filename"
              continue
            fi

            echo "Generating $filename"

            vipsthumbnail "$img" \
              --size 480x320 \
              --output "$thumb[Q=85,strip]"

          done

      - name: Commit thumbnails
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add images/birds/cards

          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Update bird thumbnails"
            git push
          fi
